services:
  wanderledger:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=file:./data/travel.db
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/login >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  seed:
    build:
      context: .
      target: seed
    profiles: ["tools"]
    volumes:
      - ./data:/app/data
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=file:./data/travel.db
